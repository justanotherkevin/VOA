<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!--
      CSP for the notification overlay window.
      NOTE: Keep CSP pattern in sync with src/renderer/index.html
      Both template files should use the same development-friendly CSP approach.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws://localhost:* http://localhost:* https://cdn.jsdelivr.net; frame-ancestors 'none'"
    />
    <title>Notification</title>
  </head>
  <body style="margin: 0; padding: 0; overflow: hidden; background: transparent;">
    <div id="notification-root"></div>
    <script type="module" src="./notification.tsx"></script>
  </body>
</html>
